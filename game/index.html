<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>松永工房クラフトストーリー 〜小さな家具と、届かなかった手紙〜</title>
<style>
/* ==========================================================
   松永工房クラフトストーリー 第4章
   「松永工房の世界を体験するゲーム」へ
   - 実在家具（プティカウチ・密談椅子・ジュエリーチェスト）
   - 時間と納期（品質を取るか、期日を取るか）
   - 設備投資（お金の使い道）
   - 手紙のきれはしを集めるメインストーリー
   絵本風 × 木の温かみ × ちょっと高級感
   ========================================================== */
:root{
  --cream:      #faf3e3;   /* 背景クリーム */
  --cream-deep: #f3e7cd;
  --brown:      #6b4a2f;   /* 濃いブラウン（文字） */
  --brown-mid:  #8a6446;
  --brown-soft: #b08a63;
  --wood-light: #e8cfa5;   /* 木目・明 */
  --wood-dark:  #caa06d;   /* 木目・暗 */
  --green:      #9dbb8f;   /* 淡いグリーン */
  --green-deep: #7a9c6e;
  --gold:       #c9a24b;   /* 高級感アクセント */
  --red:        #b8563e;   /* 納期超過などの注意色 */
  --paper:      #fffdf5;   /* カード紙色 */
  --shadow:     0 4px 12px rgba(107,74,47,.18);
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body{ height:100%; }

body{
  font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
  color:var(--brown);
  /* 工房の壁（クリーム）＋うっすら木目の横縞 */
  background:
    repeating-linear-gradient(0deg,
      rgba(176,138,99,.05) 0px,  rgba(176,138,99,.05) 2px,
      transparent 2px,           transparent 26px),
    radial-gradient(circle at 50% -10%, #fff8e8 0%, var(--cream) 60%, var(--cream-deep) 100%);
  max-width:480px;               /* スマホ縦画面想定。PCでは中央寄せ */
  margin:0 auto;
  min-height:100dvh;
  display:flex; flex-direction:column;
  user-select:none;
}

/* ---------- ヘッダー（タイトル・ステータス） ---------- */
header{
  padding:12px 14px 10px;
  text-align:center;
  /* 木の看板風 */
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.08) 0 3px, transparent 3px 34px),
    linear-gradient(180deg, var(--wood-light), var(--wood-dark));
  border-bottom:4px solid var(--brown-mid);
  border-radius:0 0 18px 18px;
  box-shadow:var(--shadow);
}
header h1{
  font-size:1.02rem; letter-spacing:.06em; color:var(--brown);
  text-shadow:0 1px 0 rgba(255,255,255,.5);
}
header h1 .sub{
  display:block; font-size:.68rem; font-weight:normal;
  color:#7d5a3c; margin-top:2px; letter-spacing:.02em;
}
.status{
  display:flex; justify-content:center; gap:6px; margin-top:8px; flex-wrap:wrap;
}
.status .chip{
  background:var(--paper); border:2px solid var(--brown-soft);
  border-radius:999px; padding:3px 10px;
  font-size:.74rem; font-weight:bold; box-shadow:0 2px 3px rgba(107,74,47,.15);
}
.lvbar{
  margin:7px auto 0; width:78%; height:8px; border-radius:999px;
  background:rgba(255,253,245,.7); border:1.5px solid var(--brown-soft); overflow:hidden;
}
.lvbar>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--green),var(--green-deep));
  transition:width .5s ease; border-radius:999px;
}
.lvbar-label{ font-size:.62rem; color:#7d5a3c; margin-top:2px; }

/* ---------- メイン ---------- */
main{ flex:1; padding:14px 14px 8px; display:flex; flex-direction:column; gap:12px; }

/* ----- ヘンリーさん（案内役・常時表示） ----- */
#henry-area{
  display:flex; align-items:flex-start; gap:10px;
}
#henry-avatar{
  flex:0 0 62px; width:62px; height:62px;
  background:var(--paper); border:2.5px solid var(--brown-soft); border-radius:50%;
  box-shadow:0 2px 5px rgba(107,74,47,.2);
  overflow:hidden;
  animation:henrySway 4s ease-in-out infinite;
}
#henry-avatar svg{ width:100%; height:100%; display:block; }
@keyframes henrySway{
  0%,100%{ transform:rotate(-2deg); } 50%{ transform:rotate(2deg); }
}
/* ヘンリーさんの吹き出し */
#message{
  flex:1; min-height:3.2em; position:relative;
  background:var(--paper); border:2px solid var(--brown-soft);
  border-radius:14px; padding:8px 12px;
  font-size:.8rem; line-height:1.6;
  transition:opacity .3s;
}
#message::before{                       /* 吹き出しのしっぽ */
  content:""; position:absolute; left:-9px; top:20px;
  border:8px solid transparent; border-right-color:var(--brown-soft);
}
#message::after{
  content:""; position:absolute; left:-6px; top:22px;
  border:6px solid transparent; border-right-color:var(--paper);
}
.henry-name{
  display:block; font-size:.6rem; color:var(--brown-soft); font-weight:bold; margin-bottom:1px;
}

/* 工房まめ知識（工程のあいまにランダムで顔を出す読みもの） */
.trivia{
  background:linear-gradient(180deg,#fdf6e6,#f7ecd2);
  border:2px dashed var(--gold); border-radius:12px;
  padding:8px 12px; font-size:.72rem; line-height:1.8;
  color:var(--brown-mid); text-align:justify;
}
.trivia b{ color:var(--brown); }
.trivia.pop{ animation:triviaIn .4s ease; }
@keyframes triviaIn{ from{ transform:translateY(-6px); opacity:0; } to{ transform:none; opacity:1; } }

/* ----- 家具カード（木のカード風） ----- */
.card{
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.05) 0 2px, transparent 2px 40px),
    linear-gradient(160deg, #fff9ec, var(--paper));
  border:3px solid var(--wood-dark);
  border-radius:20px;
  box-shadow:var(--shadow), inset 0 0 0 4px rgba(232,207,165,.35);
  padding:14px 16px 14px;
  position:relative; overflow:hidden;
}
.card .art{ width:120px; height:120px; margin:0 auto; display:block;
  filter:drop-shadow(0 4px 4px rgba(107,74,47,.22)); }
.card .art svg{ width:100%; height:100%; display:block; }
.card h2{ text-align:center; font-size:1.1rem; margin-top:2px; letter-spacing:.04em; }
.card .desc{ font-size:.76rem; color:var(--brown-mid); text-align:center; margin-top:4px; line-height:1.6; }
.card .meta{ display:flex; justify-content:center; gap:8px; margin-top:8px; font-size:.72rem; flex-wrap:wrap; }
.card .meta span{
  background:var(--cream-deep); border-radius:999px; padding:2px 9px;
  border:1px solid var(--wood-dark);
}
.card .meta .late{ color:var(--red); border-color:var(--red); font-weight:bold; }

/* 進捗バー */
.progress{
  margin-top:10px; height:14px; border-radius:999px;
  background:var(--cream-deep); border:2px solid var(--brown-soft); overflow:hidden;
}
.progress>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--gold),#e0bf74);
  transition:width .35s ease; border-radius:999px;
}
.progress-label{ text-align:center; font-size:.72rem; margin-top:4px; color:var(--brown-mid); }

/* 品質ゲージ */
.quality-row{
  display:flex; align-items:center; gap:8px; margin-top:8px; font-size:.72rem;
}
.quality-bar{
  flex:1; height:10px; border-radius:999px;
  background:var(--cream-deep); border:1.5px solid var(--brown-soft); overflow:hidden;
}
.quality-bar>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--green),var(--green-deep));
  transition:width .35s ease; border-radius:999px;
}
.rank-badge{
  display:inline-block; min-width:1.7em; text-align:center;
  font-weight:bold; font-size:.74rem; border-radius:999px; padding:1px 8px;
  border:1.5px solid currentColor;
}
.rank-S{ color:#a97c14; background:#fdf3d5; }
.rank-A{ color:var(--green-deep); background:#eef5e8; }
.rank-B{ color:var(--brown-mid); background:var(--cream-deep); }
.rank-C{ color:#9a8a78; background:#f2eee6; }

/* 完成アニメーション：ぽよん＋金色に光る */
.card.done{
  animation:cardPop .6s ease, cardGlow 1.6s ease-in-out .3s 3;
  border-color:var(--gold);
}
@keyframes cardPop{
  0%{ transform:scale(1); }
  35%{ transform:scale(1.06) rotate(-1.5deg); }
  70%{ transform:scale(.98) rotate(1deg); }
  100%{ transform:scale(1); }
}
@keyframes cardGlow{
  0%,100%{ box-shadow:var(--shadow), 0 0 0 rgba(201,162,75,0); }
  50%{ box-shadow:var(--shadow), 0 0 28px 6px rgba(201,162,75,.65); }
}
/* きらきら紙吹雪（絵文字を降らせる） */
.confetti{
  position:fixed; top:-40px; font-size:1.4rem; pointer-events:none; z-index:99;
  animation:fall 1.7s linear forwards;
}
@keyframes fall{
  to{ transform:translateY(105vh) rotate(360deg); opacity:.2; }
}

/* ----- 家具えらび（未制作時） ----- */
.select-title{ text-align:center; font-size:.86rem; color:var(--brown-mid); }
.select-list{ display:flex; flex-direction:column; gap:10px; }
.select-item{
  display:flex; align-items:center; gap:12px;
  background:var(--paper); border:2.5px solid var(--wood-dark);
  border-radius:16px; padding:8px 14px; cursor:pointer;
  box-shadow:0 3px 6px rgba(107,74,47,.15);
  transition:transform .12s;
  text-align:left; width:100%; font-family:inherit; color:inherit;
}
.select-item:active{ transform:scale(.97); }
.select-item .thumb{ width:52px; height:52px; flex:0 0 52px; }
.select-item .thumb svg{ width:100%; height:100%; }
.select-item .icon{ font-size:2rem; width:52px; text-align:center; }
.select-item .name{ font-weight:bold; font-size:.92rem; }
.select-item .info{ font-size:.68rem; color:var(--brown-mid); margin-top:2px; line-height:1.5; }
.select-item.locked{
  opacity:.55; filter:grayscale(.6); cursor:default;
  border-style:dashed; box-shadow:none;
}

/* ---------- 工程エリア ---------- */
#steps-area{ padding:4px 14px 10px; }
/* 工程チップ（進捗の見える化。押すのは下の3択ボタン） */
.steps{
  display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:10px;
}
.step-chip{
  font-size:.7rem; font-weight:bold; color:var(--brown);
  padding:5px 10px; border-radius:999px;
  border:2px solid var(--brown-soft);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
}
.step-chip.done-step{
  background:var(--wood-light); border-color:var(--wood-dark); opacity:.75;
}
.step-chip.current{
  background:linear-gradient(180deg,#eef5e8,var(--green));
  border-color:var(--green-deep);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{
  0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); }
}
/* 工程の3択（ていねい・ふつう・急ぐ） */
.choice-title{
  text-align:center; font-size:.8rem; font-weight:bold; margin-bottom:8px;
}
.choices{ display:flex; gap:8px; }
.choice-btn{
  flex:1; font-family:inherit; font-weight:bold; color:var(--brown);
  padding:12px 4px 10px; border-radius:18px; cursor:pointer;
  border:2.5px solid var(--brown-soft);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
  box-shadow:0 3px 0 var(--brown-soft);
  transition:transform .1s;
  min-height:88px;                          /* 親指で押しやすい大きさに */
}
.choice-btn .c-icon{ display:block; font-size:1.6rem; line-height:1.2; }
.choice-btn .c-label{ display:block; font-size:.92rem; margin-top:3px; }
.choice-btn .c-note{ display:block; font-size:.6rem; font-weight:normal; color:var(--brown-mid); margin-top:2px; line-height:1.4; }
.choice-btn:active:not(:disabled){ transform:translateY(2px); box-shadow:0 1px 0 var(--brown-soft); }
.choice-btn:disabled{ opacity:.55; box-shadow:none; cursor:default; }  /* 作業中 */
.choice-teinei{ border-color:var(--green-deep); box-shadow:0 3px 0 var(--green-deep);
  background:linear-gradient(180deg,#f2f7ee,#dcead4); }
.choice-teinei:active{ box-shadow:0 1px 0 var(--green-deep); }

/* 納品ボタン */
.deliver-btn{
  display:block; width:100%; margin-top:4px;
  font-family:inherit; font-size:.96rem; font-weight:bold; color:#fff;
  padding:14px; border-radius:18px; border:none; cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 4px 0 #5f7d55, var(--shadow);
  letter-spacing:.04em;
  animation:pulse 1.4s infinite;
}
.deliver-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #5f7d55; }

/* ---------- 固定フッター（図鑑・物語・設備・工房） ---------- */
footer{
  position:sticky; bottom:0; z-index:30;   /* スマホで常に押せる位置に固定 */
  display:flex; gap:6px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.08) 0 3px, transparent 3px 34px),
    linear-gradient(180deg, var(--wood-light), var(--wood-dark));
  border-top:4px solid var(--brown-mid);
  border-radius:18px 18px 0 0;
  box-shadow:0 -4px 12px rgba(107,74,47,.2);
}
.foot-btn{
  flex:1; font-family:inherit; font-size:.76rem; font-weight:bold; color:var(--brown);
  min-height:52px;                          /* 指で押しやすい高さ */
  padding:8px 2px; border-radius:14px; cursor:pointer;
  border:2.5px solid var(--brown-mid);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
  box-shadow:0 3px 0 var(--brown-mid);
}
.foot-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--brown-mid); }

/* ---------- モーダル共通 ---------- */
.modal-back{
  position:fixed; inset:0; background:rgba(80,55,35,.55);
  display:none; align-items:center; justify-content:center; z-index:50;
  padding:20px;
}
.modal-back.open{ display:flex; }
.modal{
  width:100%; max-width:420px; max-height:80dvh; overflow-y:auto;
  background:var(--paper); border:3px solid var(--wood-dark);
  border-radius:20px; padding:18px 16px;
  box-shadow:0 10px 30px rgba(60,40,20,.4);
  animation:modalIn .25s ease;
}
@keyframes modalIn{ from{ transform:translateY(24px); opacity:0; } to{ transform:none; opacity:1; } }
.modal h3{
  text-align:center; font-size:1.05rem; letter-spacing:.12em;
  border-bottom:2px dashed var(--brown-soft); padding-bottom:8px; margin-bottom:12px;
}
.modal .close{
  display:block; margin:14px auto 0; font-family:inherit; font-weight:bold;
  padding:9px 34px; border-radius:999px; cursor:pointer;
  border:2px solid var(--brown-mid); background:var(--cream-deep); color:var(--brown);
}
/* 右上の✕（スクロールしても付いてくる） */
.modal .x-close{
  position:sticky; top:0; float:right; z-index:2;
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--brown-mid); background:var(--cream-deep); color:var(--brown);
  font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer;
  box-shadow:0 2px 4px rgba(107,74,47,.25); margin-left:8px;
}

/* 図鑑エントリ */
.dex-item{
  display:flex; gap:12px; align-items:center;
  border:2px solid var(--wood-light); border-radius:14px;
  padding:8px 12px; margin-bottom:10px; background:#fffdf7;
}
.dex-item .thumb{ width:48px; height:48px; flex:0 0 48px; }
.dex-item .thumb svg{ width:100%; height:100%; }
.dex-item .icon{ font-size:1.8rem; width:48px; text-align:center; }
.dex-item .name{ font-weight:bold; font-size:.9rem; }
.dex-item .count{ font-size:.7rem; color:var(--brown-mid); margin-top:3px; line-height:1.6; }
.dex-item.unknown{ opacity:.5; filter:grayscale(1); }
/* 図鑑・工房まめ知識 */
.dex-section-title{
  text-align:center; font-size:.82rem; font-weight:bold; letter-spacing:.1em;
  margin:16px 0 10px; color:var(--brown-mid);
  border-bottom:2px dashed var(--wood-light); padding-bottom:5px;
}
.knowledge{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:10px 13px; margin-bottom:10px;
  background:linear-gradient(180deg,#fffef9,#fdf6e6);
}
.knowledge h4{ font-size:.82rem; margin-bottom:4px; }
.knowledge p{ font-size:.74rem; line-height:1.8; text-align:justify; color:var(--brown-mid); }

/* 物語エントリ（絵本ページ風） */
.story-item{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:12px 14px; margin-bottom:12px;
  background:linear-gradient(180deg,#fffef9,#fdf6e6);
}
.story-item h4{ font-size:.88rem; margin-bottom:6px; }
.story-item p{ font-size:.8rem; line-height:1.9; text-align:justify; }
.story-item.locked{ opacity:.6; }
.story-item.final{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,162,75,.25); }
/* 手紙のきれはし（メインストーリー） */
.letter-item{
  border:2px solid #d9c48f; border-radius:4px 14px 4px 14px;
  padding:10px 13px; margin-bottom:10px;
  background:
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(176,138,99,.12) 22px 23px),
    linear-gradient(180deg,#fdf8e9,#f7eed3);           /* 便箋風の罫線 */
  font-size:.78rem; line-height:1.95; text-align:justify;
}
.letter-item h4{ font-size:.8rem; margin-bottom:4px; color:#8a6a2f; }
.letter-item.locked{ opacity:.55; filter:grayscale(.4); }

/* 設備（お金の使い道） */
.gear-item{
  display:flex; gap:12px; align-items:center;
  border:2px solid var(--wood-light); border-radius:14px;
  padding:10px 12px; margin-bottom:10px; background:#fffdf7;
}
.gear-item .g-icon{ font-size:1.9rem; width:44px; text-align:center; }
.gear-item .g-name{ font-weight:bold; font-size:.88rem; }
.gear-item .g-desc{ font-size:.7rem; color:var(--brown-mid); margin-top:2px; line-height:1.6; }
.gear-item .g-body{ flex:1; }
.gear-buy{
  font-family:inherit; font-weight:bold; font-size:.74rem; color:#fff;
  padding:9px 12px; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 3px 0 #5f7d55; white-space:nowrap;
}
.gear-buy:active:not(:disabled){ transform:translateY(2px); box-shadow:0 1px 0 #5f7d55; }
.gear-buy:disabled{ background:var(--cream-deep); color:var(--brown-soft); box-shadow:none; cursor:default; }
.gear-owned{
  font-size:.74rem; font-weight:bold; color:var(--green-deep);
  border:2px solid var(--green-deep); border-radius:999px; padding:6px 10px; white-space:nowrap;
}

/* 工房紹介ページ */
.about-hero{ text-align:center; margin-bottom:12px; }
.about-hero .art{ width:110px; height:110px; margin:0 auto; }
.about-hero .art svg{ width:100%; height:100%; }
.about-hero .catch{ font-size:.82rem; color:var(--brown-mid); margin-top:6px; letter-spacing:.06em; }
.about-block{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:11px 13px; margin-bottom:10px; background:#fffdf7;
}
.about-block h4{ font-size:.84rem; margin-bottom:5px; }
.about-block p{ font-size:.76rem; line-height:1.9; text-align:justify; color:var(--brown-mid); }
.reset-link{
  text-align:center; font-size:.66rem; color:var(--brown-soft);
  margin-top:14px; text-decoration:underline; cursor:pointer;
}

/* 物語解放ポップアップ */
#story-pop .modal{ text-align:center; }
#story-pop .story-text{
  font-size:.84rem; line-height:2; margin:10px 0; text-align:justify;
  padding:12px; background:#fdf6e6; border-radius:12px;
  border:1.5px dashed var(--gold);
  white-space:pre-line;                   /* 物語＋手紙のきれはしを段落表示 */
}
.pop-badge{ font-size:2.2rem; display:block; animation:pulse 1.2s infinite; }
</style>
</head>
<body>

<!-- ========== ヘッダー：タイトルとステータス ========== -->
<header>
  <h1>🪑 松永工房クラフトストーリー
    <span class="sub">〜小さな家具と、届かなかった手紙〜</span>
  </h1>
  <div class="status">
    <span class="chip">💰 <span id="st-money">0</span>円</span>
    <span class="chip">✨ <span id="st-exp">0</span></span>
    <span class="chip">🏠 Lv.<span id="st-level">1</span></span>
    <span class="chip">📅 <span id="st-day">1</span>日目</span>
    <span class="chip">⏱ 残り<span id="st-hours">8</span>h</span>
  </div>
  <div class="lvbar"><i id="lv-fill"></i></div>
  <div class="lvbar-label" id="lv-label"></div>
</header>

let state = {
  ver: 4,                 // セーブデータのバージョン（旧データ移行の目印）
  money: 0,
  exp: 0,                 // 累計経験値（レベルはここから算出）
  level: 1,
  day: 1,                 // 何日目か
  hoursLeft: HOURS_PER_DAY, // きょうの残り作業時間
  currentId: null,        // 制作中の家具id（null=家具えらび画面）
  stepIndex: 0,           // 現在の工程番号
  quality: 0,             // 制作中の品質スコア（0〜100点）
  craftUsed: 0,           // 制作中の家具に使った時間（納期判定用）
  gear: [],               // 買った設備のidリスト
  completed: {},          // { 家具id: {count, best, bestScore} } 図鑑用
  stories: []             // 解放済み物語の家具id（"final"含む）
};

/* ---------- セーブ／ロード（ローカルストレージ） ---------- */
function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) { /* プライベートモード等では保存できないが続行可能 */ }
}
function load() {
  let savedVer = 4;   // セーブが無ければ移行は不要
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      savedVer = data.ver;   // 旧セーブ（第1・2章）には ver が無い → undefined
      state = Object.assign(state, data);
    }
  } catch (e) { /* 壊れたデータは無視して新規開始 */ }

  /* --- 旧セーブデータからの移行（壊さずに引き継ぐ） --- */
  /* 第1章: completed が数値だった旧形式 → {count, best} 形式へ */
  Object.keys(state.completed).forEach(id => {
    if (typeof state.completed[id] === "number") {
      state.completed[id] = { count: state.completed[id], best: null };
    }
  });
  if (typeof state.quality !== "number") state.quality = state.stepIndex;

  /* 第1・2章: 品質が工程ポイント制（1工程0〜2点）→ 100点制へ換算
     旧1ポイント ≒ 新6点（ふつう相当）として引き継ぐ */
  if (savedVer === undefined) {
    if (state.currentId) {
      state.quality = Math.max(0, Math.min(100, BASE_QUALITY + state.quality * 6));
    } else {
      state.quality = 0;
    }
  }

  /* 第3章まで共通: 図鑑スコア欄・時間・設備を補完（第4章形式へ） */
  if (savedVer !== 4) {
    Object.values(state.completed).forEach(rec => {
      if (rec && typeof rec === "object" && rec.bestScore === undefined) rec.bestScore = null;
    });
    if (typeof state.day !== "number") state.day = 1;
    if (typeof state.hoursLeft !== "number") state.hoursLeft = HOURS_PER_DAY;
    if (!Array.isArray(state.gear)) state.gear = [];
    /* 旧セーブに使用時間の記録は無いので、制作途中なら
       「ふつう」相当（1工程2時間）の時間を使ったとみなす */
    state.craftUsed = state.currentId ? state.stepIndex * 2 : 0;
    state.ver = 4;
  }
}

/* 現在レベルの算出と、家具の解放フラグ更新 */
function calcLevel(exp) {
  let lv = 1;
  for (let i = 0; i < LEVELS.length; i++) if (exp >= LEVELS[i]) lv = i + 1;
  return lv;
}
function refreshUnlocks() {
  FURNITURE.forEach(f => { f.unlocked = state.level >= f.unlockLevel; });
}

/* 設備の効果 */
const hasGear = (id) => state.gear.includes(id);
function gearQualityBonus() {
  return GEAR.filter(g => hasGear(g.id)).reduce((sum, g) => sum + g.effectQ, 0);
}
function gearPriceMult() {
  return GEAR.filter(g => hasGear(g.id)).reduce((m, g) => m * g.effectPrice, 1);
}

  for (const r of ["S", "A", "B"]) if (score >= RANKS[r].min) return r;

/* 納品時のSNS反応：品質ランクで変わる */

  S: [
    "📱 大バズり！「これぞ職人技…木目が芸術です」",
    "📺 テレビ局から取材の申し込みが来ました！",
    "📱 海外のコレクターから問い合わせが殺到！",
    "🏆 「今年いちばんの家具」とSNSで絶賛されました！"
  ],
  A: [
    "📱 SNSで話題になりました！「木のぬくもりがすごい…」",
    "📱 SNSで話題になりました！「ドールハウスに置きたい！」",
    "📮 お客さまから、ていねいなお礼の手紙が届きました。",
    "📻 地元のラジオで工房が紹介されました！"
  ],
  B: [
    "📱 じわじわ拡散中…「なんだかほっとする家具」",
    "🚚 配達員さんが「いい香りの荷物ですね」と笑いました。",
    "🐈 工房の猫が完成品の上で丸くなりました（納品前にどいてもらいました）。",
    "📱 「#松永工房」のタグ付き投稿がすこし増えました。"
  ],
  C: [
    "📱 「味がある…のかな？」という声もちらほら。",
    "🤔 お客さまが少し首をかしげました。…でも笑って受け取ってくれました。",
    "📱 「つぎはもっとすごいのを見たい！」と励まされました。",
    "🍵 ヘンリーさんがお茶をいれてくれました。「次があるさ」"
  ]
};

/* ==========================================================
   描画
   ========================================================== */
function renderStatus() {
  $("#st-money").textContent = state.money.toLocaleString();
  $("#st-exp").textContent = state.exp;
  $("#st-level").textContent = state.level;
  $("#st-day").textContent = state.day;
  $("#st-hours").textContent = state.hoursLeft;

  /* 次のレベルまでの進捗バー */
  const cur = LEVELS[state.level - 1];
  const next = LEVELS[state.level];   // 最大レベルなら undefined
  const fill = $("#lv-fill");
  const label = $("#lv-label");
  const title = LEVEL_TITLES[Math.min(state.level - 1, LEVEL_TITLES.length - 1)];
  if (next === undefined) {
    fill.style.width = "100%";
    label.textContent = `${title}（最高レベル！）`;
  } else {
    fill.style.width = Math.min(100, ((state.exp - cur) / (next - cur)) * 100) + "%";
    label.textContent = `${title}　次のレベルまで あと${next - state.exp}`;
  }
}

/* 家具えらび画面 */
function renderSelect() {
  const list = FURNITURE.map(f => {
    if (f.unlocked) {
      return `<button class="select-item" data-id="${f.id}">
        ${artOf(f, "thumb")}
        <span><span class="name">${f.name}</span>
        <div class="info">💰${f.price.toLocaleString()}円〜 ／ ✨${f.exp} ／ 工程 ${f.steps.length}つ ／ ⏳納期 ${f.deadline}時間</div></span>
      </button>`;
    }
    return `<div class="select-item locked">
      <span class="icon">🔒</span>
      <span><span class="name">？？？</span>
      <div class="info">工房レベル ${f.unlockLevel} で解放されます</div></span>
    </div>`;
  }).join("");
  $("#card-area").innerHTML = `<div class="select-title">🔨 今日はどの家具を作る？</div>
    <div class="select-list">${list}</div>`;
  $("#steps-area").innerHTML = "";

  /* 家具を選んで制作開始 */
  document.querySelectorAll(".select-item[data-id]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.currentId = btn.dataset.id;
      state.stepIndex = 0;
      state.quality = BASE_QUALITY + gearQualityBonus();   // 素材の品質＋設備の力
      state.craftUsed = 0;
      save();
      hideTrivia();
      const f = furnitureById(state.currentId);
      showMessage(`「${f.name}」の依頼じゃ。納期は${f.deadline}時間。品質を取るか、期日を取るか…職人の腕の見せどころじゃよ。`);
      render();
    });
  });
}

/* 制作画面（家具カード＋工程チップ＋3択ボタン） */
function renderCraft() {
  const f = furnitureById(state.currentId);
  const total = f.steps.length;
  const done = state.stepIndex >= total;
  const pct = Math.round((state.stepIndex / total) * 100);
  const score = Math.round(state.quality);
  const qPct = Math.max(0, Math.min(100, score));   // 品質ゲージ＝スコアそのまま
  const rank = calcRank(score);

  /* 納期表示（残り時間 or 超過） */
  const remain = f.deadline - state.craftUsed;
  const deadlineChip = remain >= 0
    ? `<span>⏳ 納期まで あと${remain}時間</span>`
    : `<span class="late">⏰ 納期超過 ${-remain}時間</span>`;

  $("#card-area").innerHTML = `
    <div class="card${done ? " done" : ""}" id="craft-card">
      ${artOf(f, "art")}
      <h2>${f.name}${done ? " ✨" : ""}</h2>
      <p class="desc">${f.description}</p>
      <div class="meta"><span>💰 ${f.price.toLocaleString()}円〜</span><span>✨ ${f.exp}</span>${deadlineChip}</div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <div class="progress-label">${done ? "🎉 完成！" : `工程 ${state.stepIndex} / ${total}`}</div>
      <div class="quality-row">
        <span>品質</span>
        <div class="quality-bar"><i style="width:${qPct}%"></i></div>
        <span>${score}点</span>
        ${rankBadge(rank)}
      </div>
    </div>`;

  /* 工程チップ（進捗表示） */
  const chips = `<div class="steps">` + f.steps.map((s, i) => {
    const cls = i < state.stepIndex ? "done-step" : (i === state.stepIndex ? "current" : "");
    const mark = i < state.stepIndex ? "✅ " : `${s.icon} `;
    return `<span class="step-chip ${cls}">${mark}${s.label}</span>`;
  }).join("") + `</div>`;

  if (done) {
    /* 完成 → 品質ランク・納期・設備に応じた価格で納品 */
    const onTime = state.craftUsed <= f.deadline;
    const price = finalPrice(f, rank, onTime);
    $("#steps-area").innerHTML = chips +
      `<button class="deliver-btn" id="btn-deliver">🚚 納品する（品質${rank}・${onTime ? "期日内✨" : "納期おくれ"}・＋${price.toLocaleString()}円）</button>`;
    $("#btn-deliver").addEventListener("click", deliver);
  } else {
    /* 現在の工程を「ていねい／ふつう／急ぐ」から選んで進める */
    const step = f.steps[state.stepIndex];
    $("#steps-area").innerHTML = chips +
      `<div class="choice-title">${step.icon} 「${step.label}」…どんな仕事ぶりでいく？</div>
       <div class="choices">` +
      CHOICES.map(c =>
        `<button class="choice-btn ${c.cls}" data-choice="${c.id}">
          <span class="c-icon">${c.icon}</span>
          <span class="c-label">${c.label}</span>
          <span class="c-note">${c.note}</span>
        </button>`).join("") +
      `</div>`;
    document.querySelectorAll(".choice-btn").forEach(b =>
      b.addEventListener("click", () => doStep(b.dataset.choice)));
  }

  /* 工程ボタン・納品ボタンが固定フッターに隠れないよう、
     制作中は操作エリアが見える位置まで自動スクロール。
     吹き出しの文章やまめ知識で高さが変わるため、少し後にもう一度 */
  const toBottom = () => { if (state.currentId) window.scrollTo(0, document.documentElement.scrollHeight); };
  requestAnimationFrame(toBottom);
  setTimeout(toBottom, 450);
}

function render() {
  refreshUnlocks();
  renderStatus();
  if (state.currentId) renderCraft(); else renderSelect();
}

/* ==========================================================
   ゲーム進行
   ========================================================== */
/* 納品価格：基本価格 × 品質ランク × 納期 × 設備（10円単位に丸める） */
function finalPrice(f, rank, onTime) {
  const mult = RANKS[rank].mult * (onTime ? ONTIME_MULT : LATE_MULT) * gearPriceMult();
  return Math.round(f.price * mult / 10) * 10;
}

/* 工程をひとつ進める（choiceId: 仕事ぶりの選択）
   ボタンをいったん止めて「作業の所要時間」を感じさせてから結果を出す */
function doStep(choiceId) {
  const f = furnitureById(state.currentId);
  const step = f.steps[state.stepIndex];
  const choice = CHOICES.find(c => c.id === choiceId) || CHOICES[1];

  /* 作業中…（連打防止＋時間の演出） */
  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
  showMessage(`${step.icon} ${step.label}中… ${choice.working}`);

  setTimeout(() => {
    /* 品質スコアの増減（急ぐはランダム。ときどきミスで低下） */
    const delta = choice.pts();
    state.quality = Math.max(0, Math.min(100, state.quality + delta));
    state.stepIndex++;

    /* 時間が経つ。1日8時間を使いきると日付が変わる */
    state.craftUsed += choice.hours;
    state.hoursLeft -= choice.hours;
    let dayChanged = false;
    while (state.hoursLeft <= 0) {
      state.hoursLeft += HOURS_PER_DAY;
      state.day++;
      dayChanged = true;
    }
    save();

    /* ヘンリーさんのひとこと＋工程メッセージ */
    const comment = delta < 0
      ? "ありゃ、手がすべったかの…！"
      : pick(choice.henry);
    const sign = delta >= 0 ? `+${delta}` : `${delta}`;
    let msg = `${step.icon} ${step.msg}　${comment}（品質${sign}・${choice.hours}時間）`;
    if (dayChanged) msg += `　🌙 日が暮れた。${state.day}日目の朝じゃ。`;
    showMessage(msg);
    maybeShowTrivia();

    render();
    if (state.stepIndex >= f.steps.length) {
      /* 完成演出（カードが光る＋紙吹雪） */
      confetti();
      const rank = calcRank(state.quality);
      const onTime = state.craftUsed <= f.deadline;
      showMessage(`🎉 「${f.name}」完成じゃ！ 品質${Math.round(state.quality)}点、${RANKS[rank].label}${onTime ? "　しかも期日内じゃ！" : "　納期は…まあ、次がんばろうかの。"}`);
    }
  }, choice.time);
}

/* 納品：品質と納期で報酬・SNS反応が変わる。図鑑登録・物語解放・レベルアップ */
function deliver() {
  const f = furnitureById(state.currentId);
  const score = Math.round(state.quality);
  const rank = calcRank(score);
  const onTime = state.craftUsed <= f.deadline;
  const price = finalPrice(f, rank, onTime);
  const rec = state.completed[f.id];
  const firstTime = !rec;

  state.money += price;
  state.exp += f.exp;

  /* 図鑑記録：制作回数・最高品質ランク・最高品質スコアを更新 */
  if (rec) {
    rec.count++;
    if (rec.best === null || RANK_ORDER.indexOf(rank) > RANK_ORDER.indexOf(rec.best)) rec.best = rank;
    if (rec.bestScore == null || score > rec.bestScore) rec.bestScore = score;
  } else {
    state.completed[f.id] = { count: 1, best: rank, bestScore: score };
  }

  /* レベルアップ判定 */
  const newLevel = calcLevel(state.exp);
  const leveledUp = newLevel > state.level;
  state.level = newLevel;

  /* 制作終了 → 家具えらびへ */
  state.currentId = null;
  state.stepIndex = 0;
  state.quality = 0;
  state.craftUsed = 0;
  hideTrivia();

  /* 納品メッセージ（ヘンリーさんのひとこと＋ランク別SNS反応） */
  const sns = pick(SNS_BY_RANK[rank]);
  let msg = `🚚 品質${rank}（${score}点）・${onTime ? "期日内✨" : "納期おくれ…"}で納品！ ＋${price.toLocaleString()}円　${HENRY_DELIVER[rank]}　${sns}`;
  if (leveledUp) {
    msg += `　🏠 工房レベルが ${state.level} に上がったぞ！`;
    const unlockedNow = FURNITURE.filter(x => x.unlockLevel === state.level);
    if (unlockedNow.length) msg += ` 「${unlockedNow.map(x => x.name).join("・")}」が作れるようになった！`;
    confetti();
  }
  showMessage(msg);

  /* 初完成 → 物語＋手紙のきれはしを解放 */
  if (firstTime) {
    state.stories.push(f.id);
    openStoryPop(`「${f.name}」の物語`, `${f.story}\n\n💌 ${f.letter}`);
  }
  /* 手紙のきれはしがすべてそろったら最終章を解放 */
  if (!state.stories.includes("final") &&
      FURNITURE.every(x => state.stories.includes(x.id))) {
    state.stories.push("final");
    setTimeout(() => openStoryPop(FINAL_STORY.title, FINAL_STORY.text), firstTime ? 600 : 0);
  }

  save();
  render();
}

/* ==========================================================
   モーダル（図鑑・物語・設備・工房紹介）
   ========================================================== */
function openModal(id) { $("#" + id).classList.add("open"); }
function closeModal(id) { $("#" + id).classList.remove("open"); }

/* 図鑑：品質ランク・最高品質スコア・制作回数を表示 */
function renderDex() {
  $("#dex-list").innerHTML = FURNITURE.map(f => {
    const rec = state.completed[f.id];
    if (rec && rec.count > 0) {
      const best = rec.best
        ? `最高品質 ${rankBadge(rec.best)}${rec.bestScore != null ? ` <b>${rec.bestScore}点</b>` : ""}`
        : `最高品質 <span class="rank-badge rank-B">—</span>`;   // 旧セーブは記録なし
      return `<div class="dex-item">
        ${artOf(f, "thumb")}
        <span><div class="name">${f.name}</div>
        <div class="count">🔨 制作回数 ${rec.count} 台　${best}</div></span>
      </div>`;
    }
    return `<div class="dex-item unknown">
      <span class="icon">❓</span>
      <span><div class="name">？？？</div>
      <div class="count">まだ作ったことがない</div></span>
    </div>`;
  }).join("");

  /* 工房まめ知識（Petit.Continue・アンティーク・職人技） */
  $("#knowledge-list").innerHTML = KNOWLEDGE.map(k =>
    `<div class="knowledge"><h4>${k.icon} ${k.title}</h4><p>${k.text}</p></div>`).join("");
}

/* 物語モーダル：手紙のきれはし（メインストーリー）＋家具の物語 */
function renderStories() {
  /* --- 手紙のきれはし --- */
  const found = FURNITURE.filter(f => state.stories.includes(f.id)).length;
  let letters = `<p style="text-align:center;font-size:.74rem;color:var(--brown-mid);margin-bottom:10px;">
    あつめたきれはし　${found} / ${FURNITURE.length}</p>`;
  letters += FURNITURE.map((f, i) => {
    if (state.stories.includes(f.id)) {
      return `<div class="letter-item">
        <h4>💌 きれはし その${i + 1}</h4>${f.letter}
      </div>`;
    }
    const hint = f.unlocked ? `「${f.name}」` : "まだ見ぬ家具";
    return `<div class="letter-item locked">
      <h4>🔒 きれはし その${i + 1}</h4>${hint}をはじめて完成させると、見つかるかもしれない……
    </div>`;
  }).join("");

  if (state.stories.includes("final")) {
    letters += `<div class="story-item final">
      <h4>💌 ${FINAL_STORY.title}</h4><p>${FINAL_STORY.text}</p>
    </div>`;
  } else {
    letters += `<div class="story-item locked final">
      <h4>🔒 ${FINAL_STORY.title}</h4><p>きれはしを${FURNITURE.length}枚すべて集めると、手紙の全文が読めるらしい……。</p>
    </div>`;
  }
  $("#letter-list").innerHTML = letters;

  /* --- 家具の物語 --- */
  $("#story-list").innerHTML = FURNITURE.map(f => {
    if (state.stories.includes(f.id)) {
      return `<div class="story-item">
        <h4>${f.icon} 「${f.name}」の物語</h4><p>${f.story}</p>
      </div>`;
    }
    return `<div class="story-item locked">
      <h4>🔒 まだ読めない物語</h4><p>この家具をはじめて完成させると読めるようになる。</p>
    </div>`;
  }).join("");
}

/* 設備投資：お金の使い道。買うと工房がずっと強くなる */
function renderGear() {
  $("#gear-list").innerHTML =
    `<p style="text-align:center;font-size:.74rem;color:var(--brown-mid);margin-bottom:10px;">
      いまの所持金　💰 ${state.money.toLocaleString()}円</p>` +
    GEAR.map(g => {
      const owned = hasGear(g.id);
      const btn = owned
        ? `<span class="gear-owned">✓ 導入済み</span>`
        : `<button class="gear-buy" data-gear="${g.id}" ${state.money < g.price ? "disabled" : ""}>
            💰${g.price.toLocaleString()}円で買う</button>`;
      return `<div class="gear-item">
        <span class="g-icon">${g.icon}</span>
        <span class="g-body"><div class="g-name">${g.name}</div>
        <div class="g-desc">${g.desc}</div></span>
        ${btn}
      </div>`;
    }).join("");

  /* 購入処理 */
  document.querySelectorAll(".gear-buy[data-gear]").forEach(b =>
    b.addEventListener("click", () => {
      const g = GEAR.find(x => x.id === b.dataset.gear);
      if (!g || hasGear(g.id) || state.money < g.price) return;
      state.money -= g.price;
      state.gear.push(g.id);
      save();
      confetti();
      showMessage(`🛠 「${g.name}」を工房に迎えた！ ${g.desc}　良い道具は良い仕事を作るんじゃよ。`);
      renderGear();       // モーダルを買った状態に更新
      renderStatus();     // 所持金表示を更新
    }));
}

/* 松永工房紹介ページ */
function renderAbout() {
  $("#about-body").innerHTML =
    `<div class="about-hero">
      <span class="art">${SVG_ART.henry}</span>
      <div class="catch">「小さな家具にも、大きな物語を。」</div>
    </div>` +
    ABOUT_BLOCKS.map(b =>
      `<div class="about-block"><h4>${b.icon} ${b.title}</h4><p>${b.text}</p></div>`).join("");
}

/* 物語解放ポップアップ */
function openStoryPop(title, text) {
  $("#pop-title").textContent = title;
  $("#pop-text").textContent = text;
  openModal("story-pop");
}

/* ==========================================================
   初期化
   ========================================================== */
function init() {
  load();
  /* 途中セーブとの整合（レベルは常にexpから再計算） */
  state.level = calcLevel(state.exp);

  /* 案内役ヘンリーさんを描画（常時表示） */
  $("#henry-avatar").innerHTML = SVG_ART.henry;

  /* フッターのボタン */
  $("#btn-dex").addEventListener("click", () => { renderDex(); openModal("dex-modal"); });
  $("#btn-story").addEventListener("click", () => { renderStories(); openModal("story-modal"); });
  $("#btn-gear").addEventListener("click", () => { renderGear(); openModal("gear-modal"); });
  $("#btn-about").addEventListener("click", () => { renderAbout(); openModal("about-modal"); });

  /* モーダルの閉じるボタン（下の「とじる」＋右上の✕）・背景タップ */
  document.querySelectorAll("[data-close]").forEach(b =>
    b.addEventListener("click", () => closeModal(b.dataset.close)));
  document.querySelectorAll(".modal-back").forEach(m =>
    m.addEventListener("click", (e) => { if (e.target === m) m.classList.remove("open"); }));

  /* リセット（工房紹介ページの下にひっそり） */
  $("#btn-reset").addEventListener("click", () => {
    if (confirm("セーブデータを消して、はじめからやり直しますか？")) {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  });

  render();
  if (state.currentId) {
    const f = furnitureById(state.currentId);
    showMessage(`おかえり。「${f.name}」の続きを作ろうかの。`);
  } else if (state.exp > 0) {
    showMessage("おかえり。今日も一緒に、いい家具を作ろうじゃないか。");
  } else {
    showMessage("ようこそ、松永工房へ。わしはヘンリー。この工房の家具に惚れこんでのう、勝手に案内役をしておる。……そういえば最近、家具の中から古い手紙のきれはしが見つかるんじゃよ。");
  }
}

init();
</script>
