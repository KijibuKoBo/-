<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>松永工房クラフトストーリー 〜小さな家具と、届かなかった手紙〜</title>
<style>
/* ==========================================================
   松永工房クラフトストーリー 第5章
   『家具コレクション × 工房発展 × 物語』
   - ゲームの主役は家具図鑑（コンプリートが最終目的）
   - 設計図 → 材料仕入れ → 制作(設計/素材/仕上げ) → 図鑑登録
     → 展示 → 来館者 → 収益 → 新設計図…のループ
   - 隠しレシピ発見／展示セットボーナス／工房発展
   絵本風 × 木の温かみ × ちょっと高級感
   ========================================================== */
:root{
  --cream:      #faf3e3;   /* 背景クリーム */
  --cream-deep: #f3e7cd;
  --brown:      #6b4a2f;   /* 濃いブラウン（文字） */
  --brown-mid:  #8a6446;
  --brown-soft: #b08a63;
  --wood-light: #e8cfa5;   /* 木目・明 */
  --wood-dark:  #caa06d;   /* 木目・暗 */
  --green:      #9dbb8f;   /* 淡いグリーン */
  --green-deep: #7a9c6e;
  --gold:       #c9a24b;   /* 高級感アクセント */
  --red:        #b8563e;   /* 納期超過などの注意色 */
  --paper:      #fffdf5;   /* カード紙色 */
  --shadow:     0 4px 12px rgba(107,74,47,.18);
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html,body{ height:100%; }

body{
  font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
  color:var(--brown);
  background:
    repeating-linear-gradient(0deg,
      rgba(176,138,99,.05) 0px,  rgba(176,138,99,.05) 2px,
      transparent 2px,           transparent 26px),
    radial-gradient(circle at 50% -10%, #fff8e8 0%, var(--cream) 60%, var(--cream-deep) 100%);
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  display:flex; flex-direction:column;
  user-select:none;
}

/* ---------- ヘッダー ---------- */
header{
  padding:12px 14px 10px; text-align:center;
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.08) 0 3px, transparent 3px 34px),
    linear-gradient(180deg, var(--wood-light), var(--wood-dark));
  border-bottom:4px solid var(--brown-mid);
  border-radius:0 0 18px 18px;
  box-shadow:var(--shadow);
}
header h1{
  font-size:1.02rem; letter-spacing:.06em; color:var(--brown);
  text-shadow:0 1px 0 rgba(255,255,255,.5);
}
header h1 .sub{
  display:block; font-size:.68rem; font-weight:normal;
  color:#7d5a3c; margin-top:2px; letter-spacing:.02em;
}
.status{ display:flex; justify-content:center; gap:6px; margin-top:8px; flex-wrap:wrap; }
.status .chip{
  background:var(--paper); border:2px solid var(--brown-soft);
  border-radius:999px; padding:3px 10px;
  font-size:.72rem; font-weight:bold; box-shadow:0 2px 3px rgba(107,74,47,.15);
}
.lvbar{
  margin:7px auto 0; width:78%; height:8px; border-radius:999px;
  background:rgba(255,253,245,.7); border:1.5px solid var(--brown-soft); overflow:hidden;
}
.lvbar>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--green),var(--green-deep));
  transition:width .5s ease; border-radius:999px;
}
.lvbar-label{ font-size:.62rem; color:#7d5a3c; margin-top:2px; }

/* ---------- メイン ---------- */
main{ flex:1; padding:14px 14px 8px; display:flex; flex-direction:column; gap:12px; }

/* ----- ヘンリーさん（案内役・常時表示） ----- */
#henry-area{ display:flex; align-items:flex-start; gap:10px; }
#henry-avatar{
  flex:0 0 62px; width:62px; height:62px;
  background:var(--paper); border:2.5px solid var(--brown-soft); border-radius:50%;
  box-shadow:0 2px 5px rgba(107,74,47,.2); overflow:hidden;
  animation:henrySway 4s ease-in-out infinite;
}
#henry-avatar svg{ width:100%; height:100%; display:block; }
@keyframes henrySway{ 0%,100%{ transform:rotate(-2deg); } 50%{ transform:rotate(2deg); } }
#message{
  flex:1; min-height:3.2em; position:relative;
  background:var(--paper); border:2px solid var(--brown-soft);
  border-radius:14px; padding:8px 12px;
  font-size:.8rem; line-height:1.6;
  transition:opacity .3s;
}
#message::before{
  content:""; position:absolute; left:-9px; top:20px;
  border:8px solid transparent; border-right-color:var(--brown-soft);
}
#message::after{
  content:""; position:absolute; left:-6px; top:22px;
  border:6px solid transparent; border-right-color:var(--paper);
}
.henry-name{ display:block; font-size:.6rem; color:var(--brown-soft); font-weight:bold; margin-bottom:1px; }

/* 工房まめ知識 */
.trivia{
  background:linear-gradient(180deg,#fdf6e6,#f7ecd2);
  border:2px dashed var(--gold); border-radius:12px;
  padding:8px 12px; font-size:.72rem; line-height:1.8;
  color:var(--brown-mid); text-align:justify;
}
.trivia b{ color:var(--brown); }
.trivia.pop{ animation:triviaIn .4s ease; }
@keyframes triviaIn{ from{ transform:translateY(-6px); opacity:0; } to{ transform:none; opacity:1; } }

/* ----- 家具カード ----- */
.card{
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.05) 0 2px, transparent 2px 40px),
    linear-gradient(160deg, #fff9ec, var(--paper));
  border:3px solid var(--wood-dark);
  border-radius:20px;
  box-shadow:var(--shadow), inset 0 0 0 4px rgba(232,207,165,.35);
  padding:14px 16px 14px;
  position:relative; overflow:hidden;
}
.card .art{ width:116px; height:116px; margin:0 auto; display:block;
  filter:drop-shadow(0 4px 4px rgba(107,74,47,.22)); }
.card .art svg{ width:100%; height:100%; display:block; }
.card h2{ text-align:center; font-size:1.06rem; margin-top:2px; letter-spacing:.04em; }
.card .desc{ font-size:.75rem; color:var(--brown-mid); text-align:center; margin-top:4px; line-height:1.6; }
.card .meta{ display:flex; justify-content:center; gap:6px; margin-top:8px; font-size:.7rem; flex-wrap:wrap; }
.card .meta span{
  background:var(--cream-deep); border-radius:999px; padding:2px 9px;
  border:1px solid var(--wood-dark);
}
.card .meta .late{ color:var(--red); border-color:var(--red); font-weight:bold; }

/* 進捗バー・品質ゲージ */
.progress{
  margin-top:10px; height:14px; border-radius:999px;
  background:var(--cream-deep); border:2px solid var(--brown-soft); overflow:hidden;
}
.progress>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--gold),#e0bf74);
  transition:width .35s ease; border-radius:999px;
}
.progress-label{ text-align:center; font-size:.72rem; margin-top:4px; color:var(--brown-mid); }
.quality-row{ display:flex; align-items:center; gap:8px; margin-top:8px; font-size:.72rem; }
.quality-bar{
  flex:1; height:10px; border-radius:999px;
  background:var(--cream-deep); border:1.5px solid var(--brown-soft); overflow:hidden;
}
.quality-bar>i{
  display:block; height:100%; width:0%;
  background:linear-gradient(90deg,var(--green),var(--green-deep));
  transition:width .35s ease; border-radius:999px;
}
.rank-badge{
  display:inline-block; min-width:1.7em; text-align:center;
  font-weight:bold; font-size:.74rem; border-radius:999px; padding:1px 8px;
  border:1.5px solid currentColor;
}
.rank-S{ color:#a97c14; background:#fdf3d5; }
.rank-A{ color:var(--green-deep); background:#eef5e8; }
.rank-B{ color:var(--brown-mid); background:var(--cream-deep); }
.rank-C{ color:#9a8a78; background:#f2eee6; }

/* 完成アニメーション */
.card.done{
  animation:cardPop .6s ease, cardGlow 1.6s ease-in-out .3s 3;
  border-color:var(--gold);
}
@keyframes cardPop{
  0%{ transform:scale(1); } 35%{ transform:scale(1.06) rotate(-1.5deg); }
  70%{ transform:scale(.98) rotate(1deg); } 100%{ transform:scale(1); }
}
@keyframes cardGlow{
  0%,100%{ box-shadow:var(--shadow), 0 0 0 rgba(201,162,75,0); }
  50%{ box-shadow:var(--shadow), 0 0 28px 6px rgba(201,162,75,.65); }
}
.confetti{
  position:fixed; top:-40px; font-size:1.4rem; pointer-events:none; z-index:99;
  animation:fall 1.7s linear forwards;
}
@keyframes fall{ to{ transform:translateY(105vh) rotate(360deg); opacity:.2; } }

/* ----- 設計図えらび ----- */
.select-title{ text-align:center; font-size:.86rem; color:var(--brown-mid); }
.select-list{ display:flex; flex-direction:column; gap:10px; }
.select-item{
  display:flex; align-items:center; gap:12px;
  background:var(--paper); border:2.5px solid var(--wood-dark);
  border-radius:16px; padding:8px 14px; cursor:pointer;
  box-shadow:0 3px 6px rgba(107,74,47,.15);
  transition:transform .12s;
  text-align:left; width:100%; font-family:inherit; color:inherit;
}
.select-item:active{ transform:scale(.97); }
.select-item .thumb{ width:52px; height:52px; flex:0 0 52px; }
.select-item .thumb svg{ width:100%; height:100%; }
.select-item .thumb img{ width:100%; height:100%; object-fit:contain; border-radius:10px; }
.select-item .icon{ font-size:2rem; width:52px; text-align:center; }
.select-item .name{ font-weight:bold; font-size:.9rem; }
.select-item .info{ font-size:.66rem; color:var(--brown-mid); margin-top:2px; line-height:1.5; }
.select-item.locked{
  opacity:.55; filter:grayscale(.6); cursor:default;
  border-style:dashed; box-shadow:none;
}
.mat-chip{
  display:inline-block; font-size:.64rem; border-radius:999px; padding:1px 7px;
  border:1px solid var(--wood-dark); background:var(--cream-deep); margin:1px 1px 0 0;
}
.mat-chip.ng{ color:var(--red); border-color:var(--red); background:#f8ece8; }

/* ----- 制作の設計えらび（設計・素材・仕上げ） ----- */
.prep-group{ margin-top:10px; }
.prep-group .g-title{ font-size:.76rem; font-weight:bold; margin-bottom:6px; text-align:center; }
.opt-row{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
.opt-chip{
  font-family:inherit; font-size:.74rem; font-weight:bold; color:var(--brown);
  padding:9px 12px; border-radius:14px; cursor:pointer;
  border:2px solid var(--brown-soft);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
  min-height:44px;
}
.opt-chip .o-note{ display:block; font-size:.58rem; font-weight:normal; color:var(--brown-mid); }
.opt-chip.selected{
  background:linear-gradient(180deg,#eef5e8,var(--green));
  border-color:var(--green-deep); box-shadow:0 0 0 2px rgba(122,156,110,.3);
}
.opt-chip:disabled{ opacity:.45; cursor:default; }
.start-btn{
  display:block; width:100%; margin-top:12px;
  font-family:inherit; font-size:.96rem; font-weight:bold; color:#fff;
  padding:14px; border-radius:18px; border:none; cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 4px 0 #5f7d55, var(--shadow);
}
.start-btn:disabled{ background:var(--cream-deep); color:var(--brown-soft); box-shadow:none; }
.cancel-link{
  text-align:center; font-size:.7rem; color:var(--brown-soft);
  margin-top:8px; text-decoration:underline; cursor:pointer;
}

/* ---------- 工程エリア ---------- */
#steps-area{ padding:4px 14px 10px; }
.steps{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:10px; }
.step-chip{
  font-size:.7rem; font-weight:bold; color:var(--brown);
  padding:5px 10px; border-radius:999px;
  border:2px solid var(--brown-soft);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
}
.step-chip.done-step{ background:var(--wood-light); border-color:var(--wood-dark); opacity:.75; }
.step-chip.current{
  background:linear-gradient(180deg,#eef5e8,var(--green));
  border-color:var(--green-deep);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
.choice-title{ text-align:center; font-size:.8rem; font-weight:bold; margin-bottom:8px; }
.choices{ display:flex; gap:8px; }
.choice-btn{
  flex:1; font-family:inherit; font-weight:bold; color:var(--brown);
  padding:12px 4px 10px; border-radius:18px; cursor:pointer;
  border:2.5px solid var(--brown-soft);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
  box-shadow:0 3px 0 var(--brown-soft);
  transition:transform .1s;
  min-height:88px;
}
.choice-btn .c-icon{ display:block; font-size:1.6rem; line-height:1.2; }
.choice-btn .c-label{ display:block; font-size:.92rem; margin-top:3px; }
.choice-btn .c-note{ display:block; font-size:.6rem; font-weight:normal; color:var(--brown-mid); margin-top:2px; line-height:1.4; }
.choice-btn:active:not(:disabled){ transform:translateY(2px); box-shadow:0 1px 0 var(--brown-soft); }
.choice-btn:disabled{ opacity:.55; box-shadow:none; cursor:default; }
.choice-teinei{ border-color:var(--green-deep); box-shadow:0 3px 0 var(--green-deep);
  background:linear-gradient(180deg,#f2f7ee,#dcead4); }
.choice-teinei:active{ box-shadow:0 1px 0 var(--green-deep); }

/* 完成後の2択（納品／展示） */
.finish-row{ display:flex; gap:8px; margin-top:4px; }
.deliver-btn, .exhibit-btn{
  flex:1; font-family:inherit; font-size:.84rem; font-weight:bold; color:#fff;
  padding:13px 6px; border-radius:18px; border:none; cursor:pointer;
  letter-spacing:.02em; line-height:1.4;
}
.deliver-btn{
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 4px 0 #5f7d55; animation:pulse 1.4s infinite;
}
.exhibit-btn{
  background:linear-gradient(180deg,#d8b45e,var(--gold));
  box-shadow:0 4px 0 #a97c14;
}
.exhibit-btn:disabled{ background:var(--cream-deep); color:var(--brown-soft); box-shadow:none; animation:none; }
.deliver-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #5f7d55; }
.exhibit-btn:active:not(:disabled){ transform:translateY(3px); box-shadow:0 1px 0 #a97c14; }

/* ---------- 固定フッター ---------- */
footer{
  position:sticky; bottom:0; z-index:30;
  display:flex; gap:5px;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));
  background:
    repeating-linear-gradient(90deg,
      rgba(107,74,47,.08) 0 3px, transparent 3px 34px),
    linear-gradient(180deg, var(--wood-light), var(--wood-dark));
  border-top:4px solid var(--brown-mid);
  border-radius:18px 18px 0 0;
  box-shadow:0 -4px 12px rgba(107,74,47,.2);
}
.foot-btn{
  flex:1; font-family:inherit; font-size:.7rem; font-weight:bold; color:var(--brown);
  min-height:52px;
  padding:8px 1px; border-radius:14px; cursor:pointer;
  border:2.5px solid var(--brown-mid);
  background:linear-gradient(180deg,#fffaf0,var(--cream-deep));
  box-shadow:0 3px 0 var(--brown-mid);
}
.foot-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--brown-mid); }

/* ---------- モーダル共通 ---------- */
.modal-back{
  position:fixed; inset:0; background:rgba(80,55,35,.55);
  display:none; align-items:center; justify-content:center; z-index:50;
  padding:20px;
}
.modal-back.open{ display:flex; }
.modal{
  width:100%; max-width:420px; max-height:82dvh; overflow-y:auto;
  background:var(--paper); border:3px solid var(--wood-dark);
  border-radius:20px; padding:18px 16px;
  box-shadow:0 10px 30px rgba(60,40,20,.4);
  animation:modalIn .25s ease;
}
@keyframes modalIn{ from{ transform:translateY(24px); opacity:0; } to{ transform:none; opacity:1; } }
.modal h3{
  text-align:center; font-size:1.05rem; letter-spacing:.12em;
  border-bottom:2px dashed var(--brown-soft); padding-bottom:8px; margin-bottom:12px;
}
.modal .close{
  display:block; margin:14px auto 0; font-family:inherit; font-weight:bold;
  padding:9px 34px; border-radius:999px; cursor:pointer;
  border:2px solid var(--brown-mid); background:var(--cream-deep); color:var(--brown);
}
.modal .x-close{
  position:sticky; top:0; float:right; z-index:2;
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--brown-mid); background:var(--cream-deep); color:var(--brown);
  font-family:inherit; font-size:1rem; font-weight:bold; cursor:pointer;
  box-shadow:0 2px 4px rgba(107,74,47,.25); margin-left:8px;
}
.dex-section-title{
  text-align:center; font-size:.82rem; font-weight:bold; letter-spacing:.1em;
  margin:16px 0 10px; color:var(--brown-mid);
  border-bottom:2px dashed var(--wood-light); padding-bottom:5px;
}

/* ---------- 図鑑（ゲームの主役） ---------- */
.dex-complete{
  text-align:center; margin-bottom:12px;
  background:linear-gradient(180deg,#fdf6e6,#f7ecd2);
  border:2px solid var(--gold); border-radius:14px; padding:10px;
}
.dex-complete .big{ font-size:1.3rem; font-weight:bold; color:#a97c14; }
.dex-complete .small{ font-size:.68rem; color:var(--brown-mid); margin-top:2px; }
.dex-item{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:8px 12px; margin-bottom:10px; background:#fffdf7;
}
.dex-item .d-head{ display:flex; gap:12px; align-items:center; }
.dex-item .thumb{ width:52px; height:52px; flex:0 0 52px; }
.dex-item .thumb svg{ width:100%; height:100%; }
.dex-item .thumb img{ width:100%; height:100%; object-fit:contain; border-radius:10px; }
.dex-item .icon{ font-size:1.8rem; width:52px; text-align:center; }
.dex-item .name{ font-weight:bold; font-size:.9rem; }
.dex-item .count{ font-size:.68rem; color:var(--brown-mid); margin-top:3px; line-height:1.7; }
.dex-item .d-desc{ font-size:.72rem; color:var(--brown-mid); margin-top:6px; line-height:1.7; text-align:justify; }
.dex-item .d-story{
  margin-top:6px; font-size:.74rem; line-height:1.85; text-align:justify;
  background:linear-gradient(180deg,#fffef9,#fdf6e6);
  border:1.5px dashed var(--wood-dark); border-radius:10px; padding:8px 10px;
}
.dex-item.unknown{ opacity:.6; }
.dex-item.unknown .d-head{ filter:grayscale(1); }
.dex-item.secret{ border-color:var(--gold); }
.knowledge{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:10px 13px; margin-bottom:10px;
  background:linear-gradient(180deg,#fffef9,#fdf6e6);
}
.knowledge h4{ font-size:.82rem; margin-bottom:4px; }
.knowledge p{ font-size:.74rem; line-height:1.8; text-align:justify; color:var(--brown-mid); }

/* 手紙のきれはし */
.letter-item{
  border:2px solid #d9c48f; border-radius:4px 14px 4px 14px;
  padding:10px 13px; margin-bottom:10px;
  background:
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(176,138,99,.12) 22px 23px),
    linear-gradient(180deg,#fdf8e9,#f7eed3);
  font-size:.76rem; line-height:1.95; text-align:justify;
}
.letter-item h4{ font-size:.78rem; margin-bottom:4px; color:#8a6a2f; }
.letter-item.locked{ opacity:.55; filter:grayscale(.4); }
.story-item{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:12px 14px; margin-bottom:12px;
  background:linear-gradient(180deg,#fffef9,#fdf6e6);
}
.story-item h4{ font-size:.88rem; margin-bottom:6px; }
.story-item p{ font-size:.8rem; line-height:1.9; text-align:justify; }
.story-item.locked{ opacity:.6; }
.story-item.final{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,162,75,.25); }

/* ---------- 仕入れ（材料） ---------- */
.mat-item{
  display:flex; gap:12px; align-items:center;
  border:2px solid var(--wood-light); border-radius:14px;
  padding:9px 12px; margin-bottom:9px; background:#fffdf7;
}
.mat-item .m-icon{ font-size:1.7rem; width:40px; text-align:center; }
.mat-item .m-body{ flex:1; }
.mat-item .m-name{ font-weight:bold; font-size:.86rem; }
.mat-item .m-desc{ font-size:.66rem; color:var(--brown-mid); margin-top:1px; line-height:1.5; }
.mat-item .m-own{ font-size:.72rem; font-weight:bold; color:var(--green-deep); white-space:nowrap; }
.mat-buy{
  font-family:inherit; font-weight:bold; font-size:.72rem; color:#fff;
  padding:9px 10px; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 3px 0 #5f7d55; white-space:nowrap;
}
.mat-buy:active:not(:disabled){ transform:translateY(2px); box-shadow:0 1px 0 #5f7d55; }
.mat-buy:disabled{ background:var(--cream-deep); color:var(--brown-soft); box-shadow:none; cursor:default; }

/* ---------- ショールーム（展示） ---------- */
.show-head{
  text-align:center; margin-bottom:10px;
  background:linear-gradient(180deg,#fdf6e6,#f7ecd2);
  border:2px solid var(--gold); border-radius:14px; padding:9px;
  font-size:.72rem; color:var(--brown-mid); line-height:1.8;
}
.show-head b{ color:#a97c14; font-size:.9rem; }
.show-item{
  display:flex; gap:10px; align-items:center;
  border:2px solid var(--wood-light); border-radius:14px;
  padding:8px 12px; margin-bottom:9px; background:#fffdf7;
}
.show-item .thumb{ width:46px; height:46px; flex:0 0 46px; }
.show-item .thumb svg{ width:100%; height:100%; }
.show-item .s-body{ flex:1; }
.show-item .s-name{ font-weight:bold; font-size:.82rem; }
.show-item .s-info{ font-size:.66rem; color:var(--brown-mid); margin-top:2px; line-height:1.6; }
.sell-btn{
  font-family:inherit; font-weight:bold; font-size:.7rem; color:var(--brown);
  padding:8px 10px; border-radius:12px; cursor:pointer;
  border:2px solid var(--brown-mid); background:var(--cream-deep); white-space:nowrap;
}
.bonus-chip{
  display:inline-block; font-size:.66rem; font-weight:bold; color:#a97c14;
  border:1.5px solid var(--gold); background:#fdf3d5;
  border-radius:999px; padding:2px 9px; margin:2px 1px;
}
.bonus-chip.off{ color:var(--brown-soft); border-color:var(--brown-soft); background:var(--cream-deep); opacity:.7; }

/* ---------- 設備 ---------- */
.gear-item{
  display:flex; gap:12px; align-items:center;
  border:2px solid var(--wood-light); border-radius:14px;
  padding:10px 12px; margin-bottom:10px; background:#fffdf7;
}
.gear-item .g-icon{ font-size:1.9rem; width:44px; text-align:center; }
.gear-item .g-name{ font-weight:bold; font-size:.86rem; }
.gear-item .g-desc{ font-size:.68rem; color:var(--brown-mid); margin-top:2px; line-height:1.6; }
.gear-item .g-body{ flex:1; }
.gear-buy{
  font-family:inherit; font-weight:bold; font-size:.72rem; color:#fff;
  padding:9px 11px; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(180deg,var(--green),var(--green-deep));
  box-shadow:0 3px 0 #5f7d55; white-space:nowrap;
}
.gear-buy:active:not(:disabled){ transform:translateY(2px); box-shadow:0 1px 0 #5f7d55; }
.gear-buy:disabled{ background:var(--cream-deep); color:var(--brown-soft); box-shadow:none; cursor:default; }
.gear-owned{
  font-size:.72rem; font-weight:bold; color:var(--green-deep);
  border:2px solid var(--green-deep); border-radius:999px; padding:6px 9px; white-space:nowrap;
}

/* ---------- 工房紹介 ---------- */
.about-hero{ text-align:center; margin-bottom:12px; }
.about-hero .art{ width:110px; height:110px; margin:0 auto; }
.about-hero .art svg{ width:100%; height:100%; }
.about-hero .catch{ font-size:.82rem; color:var(--brown-mid); margin-top:6px; letter-spacing:.06em; }
.about-block{
  border:2px solid var(--wood-light); border-radius:14px;
  padding:11px 13px; margin-bottom:10px; background:#fffdf7;
}
.about-block h4{ font-size:.84rem; margin-bottom:5px; }
.about-block p{ font-size:.76rem; line-height:1.9; text-align:justify; color:var(--brown-mid); }
.reset-link{
  text-align:center; font-size:.66rem; color:var(--brown-soft);
  margin-top:14px; text-decoration:underline; cursor:pointer;
}

/* 物語解放ポップアップ */
#story-pop .modal{ text-align:center; }
#story-pop .story-text{
  font-size:.84rem; line-height:2; margin:10px 0; text-align:justify;
  padding:12px; background:#fdf6e6; border-radius:12px;
  border:1.5px dashed var(--gold);
  white-space:pre-line;
}
.pop-badge{ font-size:2.2rem; display:block; animation:pulse 1.2s infinite; }
</style>
</head>
<body>

<!-- ========== ヘッダー ========== -->
<header>
  <h1>🪑 松永工房クラフトストーリー
    <span class="sub">〜小さな家具と、届かなかった手紙〜</span>
  </h1>
  <div class="status">
    <span class="chip">💰 <span id="st-money">0</span>円</span>
    <span class="chip">🏠 Lv.<span id="st-level">1</span></span>
    <span class="chip">📅 <span id="st-day">1</span>日目</span>
    <span class="chip">⏱ <span id="st-hours">8</span>h</span>
    <span class="chip">👥 のべ<span id="st-visitors">0</span>人</span>
  </div>
  <div class="lvbar"><i id="lv-fill"></i></div>
  <div class="lvbar-label" id="lv-label"></div>
</header>

<!-- ========== メイン ========== -->
<main>
  <div id="henry-area">
    <div id="henry-avatar"></div>
    <div id="message"><span class="henry-name">ヘンリーさん</span><span id="message-text"></span></div>
  </div>
  <div id="trivia" class="trivia" hidden></div>
  <div id="card-area"></div>
</main>

<!-- ========== 工程エリア ========== -->
<div id="steps-area"></div>

<!-- ========== 固定フッター ========== -->
<footer>
  <button class="foot-btn" id="btn-dex">📖<br>図鑑</button>
  <button class="foot-btn" id="btn-show">🖼<br>展示室</button>
  <button class="foot-btn" id="btn-market">🧺<br>仕入れ</button>
  <button class="foot-btn" id="btn-gear">🛠<br>設備</button>
  <button class="foot-btn" id="btn-about">🏠<br>工房</button>
</footer>

<!-- ========== モーダル：図鑑（主役。物語・手紙もここに） ========== -->
<div class="modal-back" id="dex-modal">
  <div class="modal">
    <button class="x-close" data-close="dex-modal" aria-label="とじる">✕</button>
    <h3>📖 家具図鑑</h3>
    <div id="dex-complete"></div>
    <div id="dex-list"></div>
    <div class="dex-section-title">💌 届かなかった手紙</div>
    <div id="letter-list"></div>
    <button class="close" data-close="dex-modal">とじる</button>
  </div>
</div>

<!-- ========== モーダル：ショールーム（展示） ========== -->
<div class="modal-back" id="show-modal">
  <div class="modal">
    <button class="x-close" data-close="show-modal" aria-label="とじる">✕</button>
    <h3>🖼 ショールーム</h3>
    <div id="show-body"></div>
    <button class="close" data-close="show-modal">とじる</button>
  </div>
</div>

<!-- ========== モーダル：仕入れ（材料） ========== -->
<div class="modal-back" id="market-modal">
  <div class="modal">
    <button class="x-close" data-close="market-modal" aria-label="とじる">✕</button>
    <h3>🧺 材料の仕入れ</h3>
    <div id="market-body"></div>
    <button class="close" data-close="market-modal">とじる</button>
  </div>
</div>

<!-- ========== モーダル：設備投資 ========== -->
<div class="modal-back" id="gear-modal">
  <div class="modal">
    <button class="x-close" data-close="gear-modal" aria-label="とじる">✕</button>
    <h3>🛠 工房の設備</h3>
    <div id="gear-list"></div>
    <button class="close" data-close="gear-modal">とじる</button>
  </div>
</div>

<!-- ========== モーダル：松永工房紹介 ========== -->
<div class="modal-back" id="about-modal">
  <div class="modal">
    <button class="x-close" data-close="about-modal" aria-label="とじる">✕</button>
    <h3>🏠 有限会社 松永工房</h3>
    <div id="about-body"></div>
    <div class="dex-section-title">🌰 工房まめ知識</div>
    <div id="knowledge-list"></div>
    <div class="reset-link" id="btn-reset">セーブデータを消して、はじめからやり直す</div>
    <button class="close" data-close="about-modal">とじる</button>
  </div>
</div>

<!-- ========== モーダル：物語解放ポップアップ ========== -->
<div class="modal-back" id="story-pop">
  <div class="modal">
    <span class="pop-badge" id="pop-badge">📜✨</span>
    <button class="x-close" data-close="story-pop" aria-label="とじる">✕</button>
    <h3 id="pop-title"></h3>
    <p class="story-text" id="pop-text"></p>
    <button class="close" data-close="story-pop">そっと本を閉じる</button>
  </div>
</div>

/* ---------- セーブ／ロード ---------- */
function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch (e) { /* 保存不可でも続行 */ }
}
function load() {
  let savedVer = 5;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      savedVer = data.ver;
      state = Object.assign(state, data);
    }
  } catch (e) { /* 壊れたデータは無視して新規開始 */ }

  /* --- 旧セーブデータからの移行（第1〜4章を壊さず引き継ぐ） --- */
  Object.keys(state.completed).forEach(id => {
    if (typeof state.completed[id] === "number") {
      state.completed[id] = { count: state.completed[id], best: null };
    }
  });
  if (typeof state.quality !== "number") state.quality = state.stepIndex;
  if (savedVer === undefined) {   // 第1・2章: 品質を100点制へ換算
    state.quality = state.currentId
      ? Math.max(0, Math.min(100, BASE_QUALITY + state.quality * 6)) : 0;
  }
  if (savedVer !== 4 && savedVer !== 5) {   // 第3章まで: 時間・設備を補完
    if (typeof state.day !== "number") state.day = 1;
    if (typeof state.hoursLeft !== "number") state.hoursLeft = HOURS_PER_DAY;
    if (!Array.isArray(state.gear)) state.gear = [];
    state.craftUsed = state.currentId ? state.stepIndex * 2 : 0;
  }
  if (savedVer !== 5) {   // 第4章まで: 材料・展示・来館者を補完
    Object.values(state.completed).forEach(rec => {
      if (rec && typeof rec === "object") {
        if (rec.bestScore === undefined) rec.bestScore = null;
        if (rec.bestPop === undefined) rec.bestPop = null;
      }
    });
    if (!state.materials || typeof state.materials !== "object") {
      state.materials = { walnut: 0, oak: 2, cherry: 0, brass: 0, glass: 0, cloth: 2 };
    }
    if (!Array.isArray(state.showroom)) state.showroom = [];
    if (typeof state.totalVisitors !== "number") state.totalVisitors = 0;
    if (!Array.isArray(state.seenBP)) state.seenBP = [];
    /* 旧セーブで制作途中なら、標準の組み合わせで続行（材料消費なし） */
    if (state.currentId && !state.craft) {
      state.craft = { design: "classic", wood: "oak", finish: "natural" };
    }
    state.ver = 5;
  }
}

/* ==========================================================
   材料：所持数・必要数・消費
   ========================================================== */
/* 必要材料 {woodId or null, wood数, 部品} を prep/craft の選択から計算 */
function neededMaterials(f, designId) {
  const d = designById(designId);
  const woodCount = Math.max(1, (f.materials.wood || 0) + (d.extraWood || 0));
  const parts = {};
  ["brass", "glass", "cloth"].forEach(k => { if (f.materials[k]) parts[k] = f.materials[k]; });
  return { woodCount, parts };
}
/* 選んだ木材・部品が足りているか */
function canCraft(f, designId, woodId) {
  const need = neededMaterials(f, designId);
  if ((state.materials[woodId] || 0) < need.woodCount) return false;
  return Object.keys(need.parts).every(k => (state.materials[k] || 0) >= need.parts[k]);
}
/* どれかの木材で作れるか（設計図一覧の判定用） */
function canCraftAnyWood(f) {
  return MATERIALS.filter(m => m.type === "wood")
    .some(w => canCraft(f, prepDesignDefault(f), w.id));
}
function prepDesignDefault() { return "classic"; }
/* 材料を消費して制作開始 */
function consumeMaterials(f, designId, woodId) {
  const need = neededMaterials(f, designId);
  state.materials[woodId] -= need.woodCount;
  Object.keys(need.parts).forEach(k => { state.materials[k] -= need.parts[k]; });
}

               art: base.art, photo: null, artFilter: r.filter,
               description: r.description, story: r.story, hint: r.hint };
    }));
}
const dexTotal = () => allDexEntries().length;
const dexFound = () => allDexEntries().filter(e => state.completed[e.id] && state.completed[e.id].count > 0).length;

function renderSelect() {
  const list = FURNITURE.map(f => {
    if (bpUnlocked(f)) {
      const need = neededMaterials(f, "classic");
      const partChips = Object.keys(need.parts).map(k => {
        const m = materialById(k);
        const ok = (state.materials[k] || 0) >= need.parts[k];
        return `<span class="mat-chip${ok ? "" : " ng"}">${m.icon}${m.name}×${need.parts[k]}</span>`;
      }).join("");
      const woodOk = MATERIALS.some(m => m.type === "wood" && (state.materials[m.id] || 0) >= need.woodCount);
      const woodChip = `<span class="mat-chip${woodOk ? "" : " ng"}">🪵木材×${need.woodCount}〜</span>`;
      return `<button class="select-item" data-id="${f.id}">
        ${artOf(f, "thumb")}
        <span><span class="name">${f.name}</span>
        <div class="info">💰${f.price.toLocaleString()}円〜 ／ ⏳納期${f.deadline}h ／ 人気${f.basePop}<br>${woodChip}${partChips}</div></span>
      </button>`;
    }
    return `<div class="select-item locked">
      <span class="icon">📜</span>
      <span><span class="name">？？？の設計図</span>
      <div class="info">${bpCondLabel(f)}</div></span>
    </div>`;
  }).join("");
  $("#card-area").innerHTML = `<div class="select-title">📜 どの設計図で作る？（図鑑 ${dexFound()}/${dexTotal()}）</div>
    <div class="select-list">${list}</div>`;

  document.querySelectorAll(".select-item[data-id]").forEach(btn => {
    btn.addEventListener("click", () => {
      const f = furnitureById(btn.dataset.id);
      /* 設計えらびへ。木材は持っているものを初期選択 */
      const firstWood = MATERIALS.find(m => m.type === "wood" && (state.materials[m.id] || 0) > 0);
      prep = { fid: f.id, design: "classic", wood: firstWood ? firstWood.id : "oak", finish: "natural" };
      showMessage(`「${f.name}」じゃな。設計・素材・仕上げで、家具の顔つきが決まるんじゃよ。`);
      render();
    });
  });
}

  const need = neededMaterials(f, prep.design);
  const ok = canCraft(f, prep.design, prep.wood);

  /* 選択肢の行を作る共通関数 */
  const row = (items, key, fmt) => items.map(it =>
    `<button class="opt-chip${prep[key] === it.id ? " selected" : ""}" data-k="${key}" data-v="${it.id}" ${fmt && fmt(it) === false ? "disabled" : ""}>
      ${it.icon} ${it.name}<span class="o-note">${it.note || it.desc || ""}</span>
    </button>`).join("");

  const woods = MATERIALS.filter(m => m.type === "wood").map(m => ({
    ...m, note: `${m.desc.split("。")[1] || ""}　所持${state.materials[m.id] || 0}`
  }));

  const partChips = Object.keys(need.parts).map(k => {
    const m = materialById(k);
    const okp = (state.materials[k] || 0) >= need.parts[k];
    return `<span class="mat-chip${okp ? "" : " ng"}">${m.icon}${m.name} ${state.materials[k] || 0}/${need.parts[k]}</span>`;
  }).join("");
  const woodOk = (state.materials[prep.wood] || 0) >= need.woodCount;
  const woodChip = `<span class="mat-chip${woodOk ? "" : " ng"}">${materialById(prep.wood).icon}${materialById(prep.wood).name} ${state.materials[prep.wood] || 0}/${need.woodCount}</span>`;

  $("#card-area").innerHTML = `
    <div class="card">
      ${artOf(f, "art")}
      <h2>${f.name}</h2>
      <p class="desc">${f.description}</p>
      <div class="prep-group"><div class="g-title">📐 設計</div>
        <div class="opt-row">${row(DESIGNS, "design")}</div></div>
      <div class="prep-group"><div class="g-title">🪵 素材（木材）</div>
        <div class="opt-row">${row(woods, "wood")}</div></div>
      <div class="prep-group"><div class="g-title">🖌️ 仕上げ</div>
        <div class="opt-row">${row(FINISHES, "finish")}</div></div>
      <div class="prep-group"><div class="g-title">🧺 使う材料</div>
        <div style="text-align:center;">${woodChip}${partChips}</div></div>
    </div>`;

  $("#steps-area").innerHTML =
    `<button class="start-btn" id="btn-start" ${ok ? "" : "disabled"}>
      ${ok ? "🔨 制作をはじめる" : "🧺 材料が足りない（仕入れよう）"}</button>
     <div class="cancel-link" id="btn-cancel">設計図えらびに戻る</div>`;

  document.querySelectorAll(".opt-chip").forEach(b =>
    b.addEventListener("click", () => { prep[b.dataset.k] = b.dataset.v; render(); }));
  $("#btn-cancel").addEventListener("click", () => { prep = null; render(); });
  $("#btn-start").addEventListener("click", () => {
    if (!canCraft(f, prep.design, prep.wood)) return;
    consumeMaterials(f, prep.design, prep.wood);
    state.currentId = f.id;
    state.craft = { design: prep.design, wood: prep.wood, finish: prep.finish };
    state.stepIndex = 0;
    state.craftUsed = 0;
    /* 品質＝素材50＋設備＋設計・素材・仕上げの補正 */
    state.quality = BASE_QUALITY + gearQualityBonus()
      + designById(prep.design).q + materialById(prep.wood).q + finishById(prep.finish).q;
    prep = null;
    save();
    hideTrivia();
    showMessage(`材料をそろえて、いざ制作じゃ。納期は${f.deadline}時間。よい家具になりそうかの？`);
    render();
  });
}

/* ==========================================================
   完成品（ピース）の計算：隠しレシピ判定・人気・価格
   ========================================================== */
function matchRecipe() {
  const c = state.craft || {};
  return RECIPES.find(r => r.baseId === state.currentId &&
    r.combo.design === c.design && r.combo.wood === c.wood && r.combo.finish === c.finish) || null;
}
function currentPiece() {
  const f = furnitureById(state.currentId);
  const c = state.craft || { design: "classic", wood: "oak", finish: "natural" };
  const v = matchRecipe();
  const score = Math.round(state.quality);
  const rank = calcRank(score);
  const onTime = state.craftUsed <= f.deadline;
  const d = designById(c.design), w = materialById(c.wood), fin = finishById(c.finish);
  const pop = Math.max(1, f.basePop + (v ? v.popBonus : 0) + d.pop + (w.pop || 0) + fin.pop + RANKS[rank].popBonus);
  const mult = RANKS[rank].mult * (onTime ? ONTIME_MULT : LATE_MULT)
    * d.priceMult * (w.priceMult || 1) * fin.priceMult * (v ? v.priceMult : 1) * gearPriceMult();
  const price = Math.round(f.price * mult / 10) * 10;
  return {
    fid: v ? v.id : f.id, baseId: f.id, name: v ? v.name : f.name,
    design: c.design, wood: c.wood, finish: c.finish,
    score, rank, onTime, pop, price, secret: !!v
  };
}

/* ==========================================================
   描画：制作画面
   ========================================================== */
function renderCraft() {
  const f = furnitureById(state.currentId);
  const c = state.craft || {};
  const total = f.steps.length;
  const done = state.stepIndex >= total;
  const pct = Math.round((state.stepIndex / total) * 100);
  const score = Math.round(state.quality);
  const qPct = Math.max(0, Math.min(100, score));
  const rank = calcRank(score);

  const remain = f.deadline - state.craftUsed;
  const deadlineChip = remain >= 0
    ? `<span>⏳あと${remain}h</span>`
    : `<span class="late">⏰超過${-remain}h</span>`;
  const attrChips =
    `<span>${designById(c.design).icon}${designById(c.design).name}</span>` +
    `<span>${materialById(c.wood) ? materialById(c.wood).icon + materialById(c.wood).name : ""}</span>` +
    `<span>${finishById(c.finish).icon}${finishById(c.finish).name}</span>`;

  $("#card-area").innerHTML = `
    <div class="card${done ? " done" : ""}" id="craft-card">
      ${artOf(f, "art")}
      <h2>${done ? currentPiece().name + " ✨" : f.name}</h2>
      <div class="meta">${attrChips}${deadlineChip}</div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <div class="progress-label">${done ? "🎉 完成！" : `工程 ${state.stepIndex} / ${total}`}</div>
      <div class="quality-row">
        <span>品質</span>
        <div class="quality-bar"><i style="width:${qPct}%"></i></div>
        <span>${score}点</span>
        ${rankBadge(rank)}
      </div>
    </div>`;

  const chips = `<div class="steps">` + f.steps.map((s, i) => {
    const cls = i < state.stepIndex ? "done-step" : (i === state.stepIndex ? "current" : "");
    const mark = i < state.stepIndex ? "✅ " : `${s.icon} `;
    return `<span class="step-chip ${cls}">${mark}${s.label}</span>`;
  }).join("") + `</div>`;

  if (done) {
    /* 完成 → 納品（即金）か 展示（来館収入）を選ぶ */
    const p = currentPiece();
    const slotsFree = state.showroom.length < showSlots();
    $("#steps-area").innerHTML = chips +
      `<div class="finish-row">
        <button class="deliver-btn" id="btn-deliver">🚚 納品する<br>＋${p.price.toLocaleString()}円</button>
        <button class="exhibit-btn" id="btn-exhibit" ${slotsFree ? "" : "disabled"}>🖼 展示する<br>${slotsFree ? `人気${p.pop}・毎日収入` : `展示枠がいっぱい`}</button>
      </div>`;
    $("#btn-deliver").addEventListener("click", () => finishCraft(false));
    $("#btn-exhibit").addEventListener("click", () => { if (slotsFree) finishCraft(true); });
  } else {
    const step = f.steps[state.stepIndex];
    $("#steps-area").innerHTML = chips +
      `<div class="choice-title">${step.icon} 「${step.label}」…どんな仕事ぶりでいく？</div>
       <div class="choices">` +
      CHOICES.map(ch =>
        `<button class="choice-btn ${ch.cls}" data-choice="${ch.id}">
          <span class="c-icon">${ch.icon}</span>
          <span class="c-label">${ch.label}</span>
          <span class="c-note">${ch.note.replace(/⏱\d+時間/, "⏱" + effHours(ch) + "時間")}</span>
        </button>`).join("") +
      `</div>`;
    document.querySelectorAll(".choice-btn").forEach(b =>
      b.addEventListener("click", () => doStep(b.dataset.choice)));
  }

  const toBottom = () => { if (state.currentId) window.scrollTo(0, document.documentElement.scrollHeight); };
  requestAnimationFrame(toBottom);
  setTimeout(toBottom, 450);
}

function render() {
  renderStatus();
  if (state.currentId) renderCraft();
  else if (prep) renderPrep();
  else renderSelect();
}

/* ==========================================================
   ゲーム進行
   ========================================================== */
function doStep(choiceId) {
  const f = furnitureById(state.currentId);
  const step = f.steps[state.stepIndex];
  const choice = CHOICES.find(ch => ch.id === choiceId) || CHOICES[1];
  const hours = effHours(choice);

  document.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);
  showMessage(`${step.icon} ${step.label}中… ${choice.working}`);

  setTimeout(() => {
    const delta = choice.pts();
    state.quality = Math.max(0, Math.min(100, state.quality + delta));
    state.stepIndex++;

    /* 時間経過。日付が変わると来館者がやってくる */
    state.craftUsed += hours;
    state.hoursLeft -= hours;
    let extra = "";
    while (state.hoursLeft <= 0) {
      state.hoursLeft += HOURS_PER_DAY;
      state.day++;
      extra += dailyVisitors();
    }
    save();

    const comment = delta < 0 ? "ありゃ、手がすべったかの…！" : pick(choice.henry);
    const sign = delta >= 0 ? `+${delta}` : `${delta}`;
    let msg = `${step.icon} ${step.msg}　${comment}（品質${sign}・${hours}時間）${extra}`;
    msg += announceBP();
    showMessage(msg);
    maybeShowTrivia();

    render();
    if (state.stepIndex >= f.steps.length) {
      confetti();
      const p = currentPiece();
      showMessage(`🎉 「${p.name}」完成じゃ！ 品質${p.score}点、${RANKS[p.rank].label}${p.onTime ? "　期日内じゃ！" : ""}${p.secret ? "　…おや、これはただの家具ではないぞ…！" : ""}　納品するか、展示するか選ぶのじゃ。`);
    }
  }, choice.time);
}

/* 日付が変わったときの来館者と売店収入 */
function dailyVisitors() {
  const pieces = state.showroom;
  const popSum = pieces.reduce((s, p) => s + p.pop, 0);
  const bonusMult = SET_BONUSES.reduce((m, b) => m * (b.check(pieces) ? b.mult : 1), 1);
  const visitors = Math.max(1, Math.round((3 + popSum * 0.8) * gearVisitorMult()));
  state.totalVisitors += visitors;
  let text = `　🌙 ${state.day}日目の朝じゃ。`;
  if (popSum > 0) {
    const income = Math.round(visitors * 12 * bonusMult / 10) * 10;
    state.money += income;
    text += `昨日の来館者${visitors}人・売店収入+${income.toLocaleString()}円！`;
  } else {
    text += `来館者${visitors}人（展示があればもっと来るんじゃがのう）。`;
  }
  return text;
}

/* 完成品を 納品(即売) または 展示 する。図鑑登録は両方共通 */
function finishCraft(exhibit) {
  const p = currentPiece();
  const f = furnitureById(state.currentId);
  const rec = state.completed[p.fid];
  const firstTime = !rec;

  /* --- 図鑑登録（回数・最高品質・最高人気） --- */
  if (rec) {
    rec.count++;
    if (rec.best === null || RANK_ORDER.indexOf(p.rank) > RANK_ORDER.indexOf(rec.best)) rec.best = p.rank;
    if (rec.bestScore == null || p.score > rec.bestScore) rec.bestScore = p.score;
    if (rec.bestPop == null || p.pop > rec.bestPop) rec.bestPop = p.pop;
  } else {
    state.completed[p.fid] = { count: 1, best: p.rank, bestScore: p.score, bestPop: p.pop };
  }

  state.exp += f.exp;
  const newLevel = calcLevel(state.exp);
  const leveledUp = newLevel > state.level;
  state.level = newLevel;

  /* --- 納品 or 展示 --- */
  let msg;
  if (exhibit) {
    state.showroom.push(p);
    msg = `🖼 「${p.name}」をショールームに展示した！ 人気${p.pop}。あすから来館者が見にくるぞ。`;
  } else {
    state.money += p.price;
    const sns = pick(SNS_BY_RANK[p.rank]);
    msg = `🚚 品質${p.rank}（${p.score}点）・${p.onTime ? "期日内✨" : "納期おくれ…"}で納品！ ＋${p.price.toLocaleString()}円　${HENRY_DELIVER[p.rank]}　${sns}`;
  }

  if (leveledUp) {
    msg += `　🏠 工房レベルが ${state.level} に上がったぞ！`;
    confetti();
  }

  /* 制作終了 */
  state.currentId = null;
  state.craft = null;
  state.stepIndex = 0;
  state.quality = 0;
  state.craftUsed = 0;
  hideTrivia();

  msg += announceBP();
  showMessage(msg);

  /* --- 初完成：図鑑に物語（＋手紙）が登録される --- */
  if (firstTime) {
    state.stories.push(p.fid);
    if (p.secret) {
      const r = RECIPES.find(x => x.id === p.fid);
      openStoryPop(`🎊 隠しレシピ発見！「${p.name}」`, `${r.description}\n\n${r.story}`, "🎊✨");
    } else if (f.letter && p.fid === f.id) {
      openStoryPop(`「${f.name}」を図鑑に登録！`, `${f.story}\n\n💌 ${f.letter}`);
    } else {
      openStoryPop(`「${p.name}」を図鑑に登録！`, f.story);
    }
  }
  /* 手紙がすべてそろったら最終章 */
  if (!state.stories.includes("final") &&
      FURNITURE.filter(x => x.letter).every(x => state.stories.includes(x.id))) {
    state.stories.push("final");
    setTimeout(() => openStoryPop(FINAL_STORY.title, FINAL_STORY.text), firstTime ? 600 : 0);
  }

  save();
  render();
}

/* ==========================================================
   モーダル
   ========================================================== */
function openModal(id) { $("#" + id).classList.add("open"); }
function closeModal(id) { $("#" + id).classList.remove("open"); }
function openStoryPop(title, text, badge) {
  $("#pop-badge").textContent = badge || "📜✨";
  $("#pop-title").textContent = title;
  $("#pop-text").textContent = text;
  openModal("story-pop");
}

/* ---------- 図鑑（主役）：画像・説明・記録・物語・手紙・達成率 ---------- */
function renderDex() {
  const found = dexFound(), total = dexTotal();
  $("#dex-complete").innerHTML = `<div class="dex-complete">
    <div class="big">📖 ${found} / ${total}</div>
    <div class="small">コンプリート率 ${Math.round(found / total * 100)}%　全部あつめて図鑑を完成させよう！</div>
  </div>`;

  $("#dex-list").innerHTML = allDexEntries().map(e => {
    const rec = state.completed[e.id];
    if (rec && rec.count > 0) {
      const story = state.stories.includes(e.id) && e.story
        ? `<div class="d-story">📜 ${e.story}</div>` : "";
      return `<div class="dex-item${e.kind === "secret" ? " secret" : ""}">
        <div class="d-head">
          ${artOf(e, "thumb", e.artFilter)}
          <span><div class="name">${e.kind === "secret" ? "✨ " : ""}${e.name}</div>
          <div class="count">🔨 ${rec.count}台　最高品質 ${rec.best ? rankBadge(rec.best) : "—"}${rec.bestScore != null ? ` <b>${rec.bestScore}点</b>` : ""}　💖 人気 ${rec.bestPop != null ? rec.bestPop : "—"}</div></span>
        </div>
        <div class="d-desc">${e.description}</div>
        ${story}
      </div>`;
    }
    /* 未発見 */
    const hint = e.kind === "secret"
      ? `🔮 ${e.hint}`
      : (bpUnlocked(e) ? "設計図はある。作って図鑑に登録しよう！" : bpCondLabel(e));
    return `<div class="dex-item unknown${e.kind === "secret" ? " secret" : ""}">
      <div class="d-head">
        <span class="icon">${e.kind === "secret" ? "✨" : "❓"}</span>
        <span><div class="name">？？？</div>
        <div class="count">${hint}</div></span>
      </div>
    </div>`;
  }).join("");

  /* 手紙のきれはし（図鑑の横で読める短編。副要素） */
  const withLetters = FURNITURE.filter(f => f.letter);
  const lf = lettersFound();
  let letters = `<p style="text-align:center;font-size:.72rem;color:var(--brown-mid);margin-bottom:10px;">
    あつめたきれはし　${lf} / ${withLetters.length}</p>`;
  letters += withLetters.map((f, i) => {
    if (state.stories.includes(f.id)) {
      return `<div class="letter-item"><h4>💌 きれはし その${i + 1}</h4>${f.letter}</div>`;
    }
    return `<div class="letter-item locked"><h4>🔒 きれはし その${i + 1}</h4>ある家具をはじめて完成させると見つかるらしい……</div>`;
  }).join("");
  if (state.stories.includes("final")) {
    letters += `<div class="story-item final"><h4>💌 ${FINAL_STORY.title}</h4><p>${FINAL_STORY.text}</p></div>`;
  } else {
    letters += `<div class="story-item locked final"><h4>🔒 ${FINAL_STORY.title}</h4><p>きれはしをすべて集めると、手紙の全文が読めるらしい……。</p></div>`;
  }
  $("#letter-list").innerHTML = letters;
}

/* ---------- ショールーム（展示） ---------- */
function renderShow() {
  const pieces = state.showroom;
  const popSum = pieces.reduce((s, p) => s + p.pop, 0);
  const bonuses = SET_BONUSES.map(b =>
    `<span class="bonus-chip${b.check(pieces) ? "" : " off"}">${b.check(pieces) ? "✓ " : ""}${b.name}　${b.desc}</span>`).join(" ");
  const estVisitors = Math.max(1, Math.round((3 + popSum * 0.8) * gearVisitorMult()));
  const bonusMult = SET_BONUSES.reduce((m, b) => m * (b.check(pieces) ? b.mult : 1), 1);
  const estIncome = popSum > 0 ? Math.round(estVisitors * 12 * bonusMult / 10) * 10 : 0;

  let html = `<div class="show-head">
    展示 <b>${pieces.length} / ${showSlots()}</b> 枠　合計人気 <b>${popSum}</b><br>
    あすの来館予想 👥${estVisitors}人・売店収入 💰${estIncome.toLocaleString()}円/日<br>${bonuses}
  </div>`;

  if (!pieces.length) {
    html += `<p style="text-align:center;font-size:.76rem;color:var(--brown-mid);line-height:1.9;">
      まだ何も展示されていない。<br>家具を完成させたとき「🖼 展示する」を選ぶと<br>ここに並んで、毎日収入を生むぞ。</p>`;
  } else {
    html += pieces.map((p, i) => {
      const base = furnitureById(p.baseId || p.fid) || {};
      const r = RECIPES.find(x => x.id === p.fid);
      return `<div class="show-item">
        ${artOf(base, "thumb", r ? r.filter : null)}
        <span class="s-body"><div class="s-name">${p.secret ? "✨ " : ""}${p.name}</div>
        <div class="s-info">${rankBadge(p.rank)} ${p.score}点　💖人気${p.pop}　${designById(p.design).name}・${materialById(p.wood) ? materialById(p.wood).name : ""}・${finishById(p.finish).name}</div></span>
        <button class="sell-btn" data-i="${i}">💰 ${p.price.toLocaleString()}円で売る</button>
      </div>`;
    }).join("");
  }
  $("#show-body").innerHTML = html;

  document.querySelectorAll(".sell-btn[data-i]").forEach(b =>
    b.addEventListener("click", () => {
      const i = +b.dataset.i;
      const p = state.showroom[i];
      if (!p) return;
      state.money += p.price;
      state.showroom.splice(i, 1);
      save();
      showMessage(`🚚 展示していた「${p.name}」が売れた！ ＋${p.price.toLocaleString()}円`);
      renderShow(); renderStatus();
    }));
}

/* ---------- 仕入れ（材料） ---------- */
function renderMarket() {
  $("#market-body").innerHTML =
    `<p style="text-align:center;font-size:.74rem;color:var(--brown-mid);margin-bottom:10px;">
      所持金 💰 ${state.money.toLocaleString()}円</p>` +
    MATERIALS.map(m => `<div class="mat-item">
      <span class="m-icon">${m.icon}</span>
      <span class="m-body"><div class="m-name">${m.name}</div>
      <div class="m-desc">${m.desc}</div></span>
      <span class="m-own">×${state.materials[m.id] || 0}</span>
      <button class="mat-buy" data-m="${m.id}" ${state.money < m.price ? "disabled" : ""}>
        ${m.price.toLocaleString()}円</button>
    </div>`).join("");

  document.querySelectorAll(".mat-buy[data-m]").forEach(b =>
    b.addEventListener("click", () => {

}

/* ---------- 設備 ---------- */

      save();
      confetti();
      showMessage(`🛠 「${g.name}」を工房に迎えた！ ${g.desc}　工房がまた一歩、大きくなったのう。`);
      renderGear(); renderStatus();
    }));
}

/* ---------- 工房紹介 ---------- */
function renderAbout() {
  $("#about-body").innerHTML =
    `<div class="about-hero">
      <span class="art">${SVG_ART.henry}</span>
      <div class="catch">「小さな家具にも、大きな物語を。」</div>
    </div>` +
    ABOUT_BLOCKS.map(b =>
      `<div class="about-block"><h4>${b.icon} ${b.title}</h4><p>${b.text}</p></div>`).join("");
  $("#knowledge-list").innerHTML = KNOWLEDGE.map(k =>
    `<div class="knowledge"><h4>${k.icon} ${k.title}</h4><p>${k.text}</p></div>`).join("");
}

/* ==========================================================
   初期化
   ========================================================== */
function init() {
  load();
  state.level = calcLevel(state.exp);
  /* 初回は現在解放済みの設計図を「告知済み」にしておく（起動時に騒がない） */
  if (!state.seenBP.length) state.seenBP = FURNITURE.filter(bpUnlocked).map(f => f.id);

  $("#henry-avatar").innerHTML = SVG_ART.henry;

  $("#btn-dex").addEventListener("click", () => { renderDex(); openModal("dex-modal"); });
  $("#btn-show").addEventListener("click", () => { renderShow(); openModal("show-modal"); });
  $("#btn-market").addEventListener("click", () => { renderMarket(); openModal("market-modal"); });
  $("#btn-gear").addEventListener("click", () => { renderGear(); openModal("gear-modal"); });
  $("#btn-about").addEventListener("click", () => { renderAbout(); openModal("about-modal"); });

  document.querySelectorAll("[data-close]").forEach(b =>
    b.addEventListener("click", () => closeModal(b.dataset.close)));
  document.querySelectorAll(".modal-back").forEach(m =>
    m.addEventListener("click", (e) => { if (e.target === m) m.classList.remove("open"); }));

  $("#btn-reset").addEventListener("click", () => {
    if (confirm("セーブデータを消して、はじめからやり直しますか？")) {
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    }
  });

  render();
  if (state.currentId) {
    showMessage(`おかえり。「${furnitureById(state.currentId).name}」の続きを作ろうかの。`);
  } else if (state.exp > 0) {
    showMessage(`おかえり。図鑑は ${dexFound()}/${dexTotal()}。今日はどれを作って、どう並べるかの？`);
  } else {
    showMessage("ようこそ、松永工房へ。わしはヘンリー、案内役じゃ。まずは設計図をえらんで一台作り、図鑑に登録してみるのじゃ。ゆくゆくは展示室に家具を並べて、たくさんのお客を呼ぶんじゃぞ。");
  }
}

init();
</script>
</body>
</html>
